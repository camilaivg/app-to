<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* VARIABLES GLOBALES */
    :root {
      --bg-app: #2c363b;
      --bg-card: #3a464c;
      --bg-input: #445158;
      --text-primary: #ffffff;
      --text-secondary: #aab8c0;
      --accent-cyan: #5fa5a1;
      --accent-pink: #df7b90;
      --font-main: 'Nunito', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
    body { background-color: #121212; display: flex; justify-content: center; min-height: 100vh; }

    .mobile-app-container {
      width: 100%; max-width: 480px; background-color: var(--bg-app); color: var(--text-primary);
      position: relative; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;
      padding-bottom: 80px; /* Espacio para el nav inferior */
    }

    /* HEADER */
    .app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background-color: var(--bg-app); position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--bg-input); }
    .brand-logo { font-size: 1.5rem; font-weight: 800; color: var(--accent-cyan); display: flex; align-items: center; gap: 8px; text-decoration: none;}
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .btn-icon { background-color: transparent; border: 1px solid var(--text-secondary); border-radius: 50%; width: 36px; height: 36px; color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none;}

    /* CONTENIDO FAVORITOS */
    .fav-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .fav-title { font-size: 1.6rem; font-weight: 800; color: var(--text-primary); margin-bottom: 20px; }
    
    .empty-card { background-color: var(--bg-input); border-radius: 12px; padding: 20px; font-size: 1.05rem; font-weight: 600; color: var(--text-primary); margin-bottom: 40px; border: 1px solid var(--bg-card);}

    /* ESCENA DEL MONSTRUITO EN LA BANCA */
    .scene-container { position: relative; height: 250px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 30px;}
    
    /* Animación de latido para el corazón */
    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    
    .scene-heart { color: var(--accent-pink); font-size: 6rem; position: absolute; bottom: 35px; left: 15%; z-index: 3; animation: heartbeat 2s infinite; }
    .scene-monster { color: #4a98a3; font-size: 10rem; z-index: 2; position: relative; bottom: 20px; right: -10%;}
    
    /* La banca construida con CSS */
    .bench-top { position: absolute; bottom: 40px; width: 85%; height: 18px; background-color: #5d6d75; border-radius: 8px; z-index: 1; }
    .bench-back { position: absolute; bottom: 70px; width: 85%; height: 40px; background-color: #5d6d75; border-radius: 8px; z-index: 0; opacity: 0.8;}
    .bench-leg-left { position: absolute; bottom: 0; left: 20%; width: 12px; height: 45px; background-color: #4a575e; border-radius: 4px; }
    .bench-leg-right { position: absolute; bottom: 0; right: 20%; width: 12px; height: 45px; background-color: #4a575e; border-radius: 4px; }

    /* FOOTER FINAL */
    .footer-final-section { display: flex; flex-direction: column; align-items: center; padding: 30px 20px 100px 20px; background-color: var(--bg-app); border-top: 1px solid var(--bg-input);}
    .lang-selector-pill { display: flex; width: 100%; background-color: var(--bg-input); border-radius: 25px; margin-bottom: 30px; overflow: hidden; }
    .lang-flag { padding: 12px 20px; background-color: var(--bg-card); display: flex; align-items: center; gap: 8px; border-right: 1px solid var(--bg-app); cursor: pointer; }
    .lang-text { flex: 1; padding: 12px; background-color: var(--bg-card); display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; color: var(--text-primary); font-weight: 600; font-size: 1rem; }
    .footer-links-center { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 30px; }
    .footer-link-row { display: flex; gap: 15px; justify-content: center; width: 100%; flex-wrap: wrap;}
    .footer-link-row a { color: var(--text-primary); text-decoration: none; font-size: 0.95rem; }
    .social-icons-row { display: flex; gap: 12px; margin-bottom: 40px; justify-content: center; }
    .social-icons-row a { width: 36px; height: 36px; background-color: var(--bg-input); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; text-decoration: none; }
    .footer-copyright { color: var(--text-primary); display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 600; }

    /* BOTTOM NAVIGATION */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background-color: var(--bg-app); display: flex; justify-content: space-around; align-items: center; padding: 12px 0 16px 0; border-top: 1px solid var(--bg-card); z-index: 200; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; color: var(--text-secondary); font-size: 0.75rem; font-weight: 600; }
    .nav-item i { font-size: 1.3rem; }
    .nav-item.active { color: var(--accent-cyan); }
  </style>
</head>
